<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Compressor</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111c34;
        --panel-2: #18254a;
        --text: #e6eefc;
        --muted: #94a3b8;
        --accent: #6366f1;
        --accent-2: #22d3ee;
        --success: #10b981;
        --danger: #ef4444;
        --border: rgba(255, 255, 255, 0.08);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(1200px 600px at 20% -10%, rgba(99, 102, 241, 0.25), transparent 60%),
          radial-gradient(900px 500px at 100% 110%, rgba(34, 211, 238, 0.18), transparent 60%),
          var(--bg);
        color: var(--text);
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }

      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 56px 20px 80px;
      }

      header {
        text-align: center;
        margin-bottom: 32px;
      }

      header h1 {
        margin: 0 0 8px;
        font-size: 30px;
        letter-spacing: -0.02em;
      }

      header p {
        margin: 0;
        color: var(--muted);
      }

      .card {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      .drop {
        border: 2px dashed rgba(255, 255, 255, 0.18);
        border-radius: 14px;
        padding: 36px 20px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease, transform 0.05s ease;
      }
      .drop:hover { border-color: var(--accent); background: rgba(99, 102, 241, 0.06); }
      .drop.drag { border-color: var(--accent-2); background: rgba(34, 211, 238, 0.08); }

      .drop .icon {
        width: 56px; height: 56px; margin: 0 auto 10px;
        display: grid; place-items: center;
        border-radius: 50%;
        background: rgba(99, 102, 241, 0.15);
        color: var(--accent-2);
        font-size: 28px;
      }
      .drop .title { font-weight: 600; margin-bottom: 4px; }
      .drop .sub { color: var(--muted); font-size: 13px; }

      input[type="file"] { display: none; }

      .file-row {
        display: flex; align-items: center; gap: 12px;
        margin-top: 16px; padding: 12px 14px;
        border: 1px solid var(--border); border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
      }
      .file-row .name { font-weight: 600; flex: 1; word-break: break-all; }
      .file-row .meta { color: var(--muted); font-size: 13px; }
      .file-row button {
        background: transparent; border: none; color: var(--muted);
        cursor: pointer; font-size: 18px;
      }
      .file-row button:hover { color: var(--danger); }

      /* ── Compression slider section ── */
      .level {
        margin-top: 22px;
      }
      .level-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
      }
      .level-header .level-label {
        color: var(--muted);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .level-header .level-badge {
        font-size: 13px;
        font-weight: 700;
        color: var(--accent-2);
        letter-spacing: 0.01em;
      }

      /* Preset quick-pick row */
      .presets {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        margin-bottom: 14px;
      }
      .presets button {
        background: rgba(0,0,0,0.2);
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 6px 5px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        text-align: center;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
        line-height: 1.2;
      }
      .presets button .preset-hint {
        display: block;
        font-weight: 400;
        font-size: 10px;
        margin-top: 2px;
        opacity: 0.7;
      }
      .presets button:hover {
        background: rgba(99,102,241,0.1);
        border-color: rgba(99,102,241,0.35);
        color: var(--text);
      }
      .presets button.active {
        background: rgba(99,102,241,0.2);
        border-color: rgba(99,102,241,0.65);
        color: var(--text);
      }

      /* Slider track */
      .slider-wrap {
        position: relative;
        padding-bottom: 6px;
      }
      .track-bg {
        position: absolute;
        top: 50%; left: 0; right: 0;
        height: 6px;
        margin-top: -3px;
        border-radius: 3px;
        background: linear-gradient(
          to right,
          #10b981 0%,
          #22d3ee 30%,
          #f59e0b 60%,
          #ef4444 100%
        );
        pointer-events: none;
      }
      input[type="range"].comp-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        background: transparent;
        border-radius: 3px;
        outline: none;
        cursor: pointer;
        position: relative;
      }
      input[type="range"].comp-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 22px; height: 22px;
        border-radius: 50%;
        background: var(--text);
        border: 3px solid var(--accent);
        box-shadow: 0 0 0 4px rgba(99,102,241,0.25), 0 2px 8px rgba(0,0,0,0.4);
        transition: box-shadow 0.15s ease, border-color 0.15s ease;
        cursor: grab;
      }
      input[type="range"].comp-slider:active::-webkit-slider-thumb {
        cursor: grabbing;
        box-shadow: 0 0 0 6px rgba(99,102,241,0.35), 0 2px 8px rgba(0,0,0,0.4);
      }
      input[type="range"].comp-slider::-moz-range-thumb {
        width: 22px; height: 22px;
        border-radius: 50%;
        background: var(--text);
        border: 3px solid var(--accent);
        box-shadow: 0 0 0 4px rgba(99,102,241,0.25), 0 2px 8px rgba(0,0,0,0.4);
        cursor: grab;
      }

      /* Info pills below slider */
      .slider-info {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .info-pill {
        flex: 1;
        min-width: 120px;
        background: rgba(0,0,0,0.25);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .info-pill .pill-label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .info-pill .pill-val {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }

      .actions {
        margin-top: 18px;
        display: flex; gap: 10px; flex-wrap: wrap;
      }

      button.primary {
        flex: 1; min-width: 180px;
        padding: 13px 18px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #0b1226; font-weight: 700; font-size: 15px;
        border: none; border-radius: 10px; cursor: pointer;
        transition: transform 0.05s ease, opacity 0.15s ease;
      }
      button.primary:hover { transform: translateY(-1px); }
      button.primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      button.ghost {
        padding: 13px 18px;
        background: transparent; color: var(--text);
        border: 1px solid var(--border); border-radius: 10px;
        cursor: pointer;
      }
      button.ghost:hover { border-color: var(--accent); }

      .status {
        margin-top: 18px;
        font-size: 14px;
        min-height: 1.2em;
      }
      .status.error { color: var(--danger); }
      .status.busy { color: var(--muted); }

      .result {
        margin-top: 18px;
        padding: 16px;
        border-radius: 12px;
        border: 1px solid rgba(16, 185, 129, 0.35);
        background: rgba(16, 185, 129, 0.08);
        display: none;
      }
      .result.show { display: block; }
      .result h3 { margin: 0 0 10px; color: var(--success); font-size: 16px; }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin: 10px 0 14px;
      }
      .stat {
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .stat .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
      .stat .value { font-weight: 700; font-size: 16px; margin-top: 2px; }

      a.download {
        display: inline-block;
        padding: 11px 16px;
        background: var(--success);
        color: #062018; font-weight: 700;
        border-radius: 10px; text-decoration: none;
      }
      a.download:hover { filter: brightness(1.05); }

      footer {
        text-align: center; color: var(--muted); font-size: 12px;
        margin-top: 22px;
      }

      .spinner {
        display: inline-block; width: 14px; height: 14px;
        border: 2px solid rgba(255,255,255,0.25);
        border-top-color: var(--accent-2);
        border-radius: 50%; animation: spin 0.8s linear infinite;
        vertical-align: -2px; margin-right: 8px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>PDF Compressor</h1>
        <p>Upload a PDF and shrink its file size in one click.</p>
      </header>

      <div class="card">
        <label id="drop" class="drop" for="file">
          <div class="icon">PDF</div>
          <div class="title">Click to choose a PDF, or drag &amp; drop it here</div>
          <div class="sub">Maximum size: 50 MB</div>
        </label>
        <input id="file" type="file" accept="application/pdf,.pdf" />

        <div id="fileRow" class="file-row" style="display: none;">
          <div>
            <div class="name" id="fileName"></div>
            <div class="meta" id="fileMeta"></div>
          </div>
          <button id="clearBtn" type="button" title="Remove">&times;</button>
        </div>

        <div class="level">
          <div class="level-header">
            <span class="level-label">Compression</span>
            <span class="level-badge" id="levelBadge">Medium</span>
          </div>

          <div class="presets" id="presets" role="group" aria-label="Compression presets">
            <button type="button" data-slider="20">Light<span class="preset-hint">Best quality</span></button>
            <button type="button" data-slider="45" class="active">Medium<span class="preset-hint">Recommended</span></button>
            <button type="button" data-slider="70">Strong<span class="preset-hint">Smaller file</span></button>
            <button type="button" data-slider="95">Extreme<span class="preset-hint">Max squeeze</span></button>
          </div>

          <div class="slider-wrap">
            <div class="track-bg"></div>
            <input id="compSlider" class="comp-slider" type="range" min="0" max="100" value="45" aria-label="Compression amount" />
          </div>

          <div class="slider-info">
            <div class="info-pill">
              <span class="pill-label">JPEG Quality</span>
              <span class="pill-val" id="pillQuality">55</span>
            </div>
            <div class="info-pill">
              <span class="pill-label">Max Dimension</span>
              <span class="pill-val" id="pillDim">1700 px</span>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="compressBtn" class="primary" disabled>Compress PDF</button>
          <button id="resetBtn" class="ghost" type="button">Reset</button>
        </div>

        <div id="status" class="status"></div>

        <div id="result" class="result">
          <h3>Done!</h3>
          <div class="stats">
            <div class="stat"><div class="label">Original</div><div class="value" id="origVal">-</div></div>
            <div class="stat"><div class="label">Compressed</div><div class="value" id="compVal">-</div></div>
            <div class="stat"><div class="label">Saved</div><div class="value" id="savedVal">-</div></div>
          </div>
          <a id="downloadLink" class="download" href="#">Download compressed PDF</a>
        </div>
      </div>

      <footer>Runs locally with Flask + PyMuPDF.</footer>
    </div>

    <script>
      /* ── DOM refs ── */
      const fileInput   = document.getElementById("file");
      const drop        = document.getElementById("drop");
      const fileRow     = document.getElementById("fileRow");
      const fileName    = document.getElementById("fileName");
      const fileMeta    = document.getElementById("fileMeta");
      const clearBtn    = document.getElementById("clearBtn");
      const compressBtn = document.getElementById("compressBtn");
      const resetBtn    = document.getElementById("resetBtn");
      const statusEl    = document.getElementById("status");
      const resultEl    = document.getElementById("result");
      const origVal     = document.getElementById("origVal");
      const compVal     = document.getElementById("compVal");
      const savedVal    = document.getElementById("savedVal");
      const downloadLink= document.getElementById("downloadLink");
      const presetsEl   = document.getElementById("presets");
      const slider      = document.getElementById("compSlider");
      const levelBadge  = document.getElementById("levelBadge");
      const pillQuality = document.getElementById("pillQuality");
      const pillDim     = document.getElementById("pillDim");

      let currentFile = null;

      /* ── Slider ↔ compression param mapping ──
         Control points: [sliderValue, jpegQuality, maxDim]
         Values between points are linearly interpolated.                     */
      const STOPS = [
        { s:  0, q: 92, d: 2800 },   // no compression extreme
        { s: 20, q: 75, d: 2200 },   // Light
        { s: 45, q: 55, d: 1700 },   // Medium
        { s: 70, q: 38, d: 1300 },   // Strong
        { s: 95, q: 15, d:  900 },   // Extreme
        { s:100, q: 10, d:  750 },   // absolute max
      ];

      const PRESETS = [
        { label: "Light",   s: 20 },
        { label: "Medium",  s: 45 },
        { label: "Strong",  s: 70 },
        { label: "Extreme", s: 95 },
      ];

      function lerp(a, b, t) { return Math.round(a + (b - a) * t); }

      function sliderToParams(v) {
        v = Math.max(0, Math.min(100, v));
        for (let i = 0; i < STOPS.length - 1; i++) {
          if (v >= STOPS[i].s && v <= STOPS[i+1].s) {
            const t = (v - STOPS[i].s) / (STOPS[i+1].s - STOPS[i].s);
            return {
              quality: lerp(STOPS[i].q, STOPS[i+1].q, t),
              maxDim:  lerp(STOPS[i].d, STOPS[i+1].d, t),
            };
          }
        }
        return { quality: 55, maxDim: 1700 };
      }

      function sliderLabel(v) {
        const snap = PRESETS.find(p => Math.abs(p.s - v) <= 1);
        return snap ? snap.label : "Custom";
      }

      function updateSliderUI(v) {
        const { quality, maxDim } = sliderToParams(v);
        pillQuality.textContent = quality;
        pillDim.textContent     = maxDim + " px";
        levelBadge.textContent  = sliderLabel(v);

        /* highlight matching preset button (if any) */
        presetsEl.querySelectorAll("button").forEach(btn => {
          btn.classList.toggle("active", Math.abs(+btn.dataset.slider - v) <= 1);
        });
      }

      slider.addEventListener("input", () => updateSliderUI(+slider.value));

      presetsEl.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-slider]");
        if (!btn) return;
        slider.value = btn.dataset.slider;
        updateSliderUI(+slider.value);
      });

      /* initialise UI */
      updateSliderUI(+slider.value);

      /* ── Utilities ── */
      function fmtSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(2) + " MB";
      }

      function setStatus(msg, kind) {
        statusEl.textContent = "";
        statusEl.className = "status" + (kind ? " " + kind : "");
        if (kind === "busy") {
          const s = document.createElement("span");
          s.className = "spinner";
          statusEl.appendChild(s);
        }
        statusEl.appendChild(document.createTextNode(msg));
      }

      /* ── File handling ── */
      function setFile(file) {
        if (!file) return;
        if (!file.name.toLowerCase().endsWith(".pdf")) {
          setStatus("Please select a PDF file.", "error");
          return;
        }
        currentFile = file;
        fileName.textContent = file.name;
        fileMeta.textContent = fmtSize(file.size);
        fileRow.style.display = "flex";
        compressBtn.disabled = false;
        resultEl.classList.remove("show");
        setStatus("");
      }

      function clearFile() {
        currentFile = null;
        fileInput.value = "";
        fileRow.style.display = "none";
        compressBtn.disabled = true;
        resultEl.classList.remove("show");
        setStatus("");
      }

      fileInput.addEventListener("change", (e) => setFile(e.target.files[0]));
      clearBtn.addEventListener("click", clearFile);
      resetBtn.addEventListener("click", clearFile);

      ["dragenter", "dragover"].forEach(ev =>
        drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("drag"); })
      );
      ["dragleave", "drop"].forEach(ev =>
        drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("drag"); })
      );
      drop.addEventListener("drop", e => {
        const f = e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) setFile(f);
      });

      /* ── Compress ── */
      compressBtn.addEventListener("click", async () => {
        if (!currentFile) return;
        compressBtn.disabled = true;
        resetBtn.disabled = true;
        resultEl.classList.remove("show");
        setStatus("Compressing...", "busy");

        const { quality, maxDim } = sliderToParams(+slider.value);

        const form = new FormData();
        form.append("file", currentFile);
        form.append("jpeg_quality", quality);
        form.append("max_dim", maxDim);

        try {
          const res  = await fetch("/compress", { method: "POST", body: form });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Compression failed");

          origVal.textContent = fmtSize(data.original_size);
          compVal.textContent = fmtSize(data.compressed_size);
          savedVal.textContent = data.saved_bytes > 0
            ? `${fmtSize(data.saved_bytes)} (${data.saved_percent}%)`
            : "Already optimized";

          downloadLink.setAttribute(
            "href",
            `/download/${data.token}?name=${encodeURIComponent(data.original_name)}`
          );
          resultEl.classList.add("show");
          setStatus("");
        } catch (err) {
          setStatus(err.message, "error");
        } finally {
          compressBtn.disabled = false;
          resetBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
