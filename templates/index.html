<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Compressor</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111c34;
        --panel-2: #18254a;
        --text: #e6eefc;
        --muted: #94a3b8;
        --accent: #6366f1;
        --accent-2: #22d3ee;
        --success: #10b981;
        --danger: #ef4444;
        --border: rgba(255, 255, 255, 0.08);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(1200px 600px at 20% -10%, rgba(99, 102, 241, 0.25), transparent 60%),
          radial-gradient(900px 500px at 100% 110%, rgba(34, 211, 238, 0.18), transparent 60%),
          var(--bg);
        color: var(--text);
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }

      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 56px 20px 80px;
      }

      header {
        text-align: center;
        margin-bottom: 32px;
      }

      header h1 {
        margin: 0 0 8px;
        font-size: 30px;
        letter-spacing: -0.02em;
      }

      header p {
        margin: 0;
        color: var(--muted);
      }

      .card {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      .drop {
        border: 2px dashed rgba(255, 255, 255, 0.18);
        border-radius: 14px;
        padding: 36px 20px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease, transform 0.05s ease;
      }
      .drop:hover { border-color: var(--accent); background: rgba(99, 102, 241, 0.06); }
      .drop.drag { border-color: var(--accent-2); background: rgba(34, 211, 238, 0.08); }

      .drop .icon {
        width: 56px; height: 56px; margin: 0 auto 10px;
        display: grid; place-items: center;
        border-radius: 50%;
        background: rgba(99, 102, 241, 0.15);
        color: var(--accent-2);
        font-size: 28px;
      }
      .drop .title { font-weight: 600; margin-bottom: 4px; }
      .drop .sub { color: var(--muted); font-size: 13px; }

      input[type="file"] { display: none; }

      .file-row {
        display: flex; align-items: center; gap: 12px;
        margin-top: 16px; padding: 12px 14px;
        border: 1px solid var(--border); border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
      }
      .file-row .name { font-weight: 600; flex: 1; word-break: break-all; }
      .file-row .meta { color: var(--muted); font-size: 13px; }
      .file-row button {
        background: transparent; border: none; color: var(--muted);
        cursor: pointer; font-size: 18px;
      }
      .file-row button:hover { color: var(--danger); }

      .level {
        margin-top: 18px;
      }
      .level .level-label {
        color: var(--muted);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
      }
      .seg {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 4px;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .seg button {
        background: transparent;
        color: var(--text);
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 9px 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .seg button .hint {
        display: block;
        font-weight: 400;
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .seg button:hover { background: rgba(255, 255, 255, 0.04); }
      .seg button.active {
        background: rgba(99, 102, 241, 0.18);
        border-color: rgba(99, 102, 241, 0.55);
      }
      .seg button.active .hint { color: var(--text); }

      .actions {
        margin-top: 18px;
        display: flex; gap: 10px; flex-wrap: wrap;
      }

      button.primary {
        flex: 1; min-width: 180px;
        padding: 13px 18px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #0b1226; font-weight: 700; font-size: 15px;
        border: none; border-radius: 10px; cursor: pointer;
        transition: transform 0.05s ease, opacity 0.15s ease;
      }
      button.primary:hover { transform: translateY(-1px); }
      button.primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      button.ghost {
        padding: 13px 18px;
        background: transparent; color: var(--text);
        border: 1px solid var(--border); border-radius: 10px;
        cursor: pointer;
      }
      button.ghost:hover { border-color: var(--accent); }

      .status {
        margin-top: 18px;
        font-size: 14px;
        min-height: 1.2em;
      }
      .status.error { color: var(--danger); }
      .status.busy { color: var(--muted); }

      .result {
        margin-top: 18px;
        padding: 16px;
        border-radius: 12px;
        border: 1px solid rgba(16, 185, 129, 0.35);
        background: rgba(16, 185, 129, 0.08);
        display: none;
      }
      .result.show { display: block; }
      .result h3 { margin: 0 0 10px; color: var(--success); font-size: 16px; }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin: 10px 0 14px;
      }
      .stat {
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .stat .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
      .stat .value { font-weight: 700; font-size: 16px; margin-top: 2px; }

      a.download {
        display: inline-block;
        padding: 11px 16px;
        background: var(--success);
        color: #062018; font-weight: 700;
        border-radius: 10px; text-decoration: none;
      }
      a.download:hover { filter: brightness(1.05); }

      footer {
        text-align: center; color: var(--muted); font-size: 12px;
        margin-top: 22px;
      }

      .spinner {
        display: inline-block; width: 14px; height: 14px;
        border: 2px solid rgba(255,255,255,0.25);
        border-top-color: var(--accent-2);
        border-radius: 50%; animation: spin 0.8s linear infinite;
        vertical-align: -2px; margin-right: 8px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>PDF Compressor</h1>
        <p>Upload a PDF and shrink its file size in one click.</p>
      </header>

      <div class="card">
        <label id="drop" class="drop" for="file">
          <div class="icon">PDF</div>
          <div class="title">Click to choose a PDF, or drag &amp; drop it here</div>
          <div class="sub">Maximum size: 50 MB</div>
        </label>
        <input id="file" type="file" accept="application/pdf,.pdf" />

        <div id="fileRow" class="file-row" style="display: none;">
          <div>
            <div class="name" id="fileName"></div>
            <div class="meta" id="fileMeta"></div>
          </div>
          <button id="clearBtn" type="button" title="Remove">&times;</button>
        </div>

        <div class="level">
          <div class="level-label">Compression level</div>
          <div class="seg" id="levelSeg" role="group" aria-label="Compression level">
            <button type="button" data-level="light">Light<span class="hint">Best quality</span></button>
            <button type="button" data-level="medium" class="active">Medium<span class="hint">Recommended</span></button>
            <button type="button" data-level="strong">Strong<span class="hint">Smallest size</span></button>
            <button type="button" data-level="extreme">Extreme<span class="hint">Max squeeze</span></button>
          </div>
        </div>

        <div class="actions">
          <button id="compressBtn" class="primary" disabled>Compress PDF</button>
          <button id="resetBtn" class="ghost" type="button">Reset</button>
        </div>

        <div id="status" class="status"></div>

        <div id="result" class="result">
          <h3>Done!</h3>
          <div class="stats">
            <div class="stat"><div class="label">Original</div><div class="value" id="origVal">-</div></div>
            <div class="stat"><div class="label">Compressed</div><div class="value" id="compVal">-</div></div>
            <div class="stat"><div class="label">Saved</div><div class="value" id="savedVal">-</div></div>
          </div>
          <a id="downloadLink" class="download" href="#">Download compressed PDF</a>
        </div>
      </div>

      <footer>Runs locally with Flask + PyMuPDF.</footer>
    </div>

    <script>
      const fileInput = document.getElementById("file");
      const drop = document.getElementById("drop");
      const fileRow = document.getElementById("fileRow");
      const fileName = document.getElementById("fileName");
      const fileMeta = document.getElementById("fileMeta");
      const clearBtn = document.getElementById("clearBtn");
      const compressBtn = document.getElementById("compressBtn");
      const resetBtn = document.getElementById("resetBtn");
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const origVal = document.getElementById("origVal");
      const compVal = document.getElementById("compVal");
      const savedVal = document.getElementById("savedVal");
      const downloadLink = document.getElementById("downloadLink");

      const levelSeg = document.getElementById("levelSeg");
      let currentFile = null;
      let currentLevel = "medium";

      levelSeg.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-level]");
        if (!btn) return;
        currentLevel = btn.dataset.level;
        levelSeg.querySelectorAll("button").forEach((b) =>
          b.classList.toggle("active", b === btn)
        );
      });

      function fmtSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(2) + " MB";
      }

      function setStatus(msg, kind) {
        statusEl.textContent = "";
        statusEl.className = "status" + (kind ? " " + kind : "");
        if (kind === "busy") {
          const s = document.createElement("span");
          s.className = "spinner";
          statusEl.appendChild(s);
        }
        statusEl.appendChild(document.createTextNode(msg));
      }

      function setFile(file) {
        if (!file) return;
        if (!file.name.toLowerCase().endsWith(".pdf")) {
          setStatus("Please select a PDF file.", "error");
          return;
        }
        currentFile = file;
        fileName.textContent = file.name;
        fileMeta.textContent = fmtSize(file.size);
        fileRow.style.display = "flex";
        compressBtn.disabled = false;
        resultEl.classList.remove("show");
        setStatus("");
      }

      function clearFile() {
        currentFile = null;
        fileInput.value = "";
        fileRow.style.display = "none";
        compressBtn.disabled = true;
        resultEl.classList.remove("show");
        setStatus("");
      }

      fileInput.addEventListener("change", (e) => setFile(e.target.files[0]));
      clearBtn.addEventListener("click", clearFile);
      resetBtn.addEventListener("click", clearFile);

      ["dragenter", "dragover"].forEach((ev) =>
        drop.addEventListener(ev, (e) => {
          e.preventDefault();
          drop.classList.add("drag");
        })
      );
      ["dragleave", "drop"].forEach((ev) =>
        drop.addEventListener(ev, (e) => {
          e.preventDefault();
          drop.classList.remove("drag");
        })
      );
      drop.addEventListener("drop", (e) => {
        const f = e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) setFile(f);
      });

      compressBtn.addEventListener("click", async () => {
        if (!currentFile) return;
        compressBtn.disabled = true;
        resetBtn.disabled = true;
        resultEl.classList.remove("show");
        setStatus("Compressing...", "busy");

        const form = new FormData();
        form.append("file", currentFile);
        form.append("level", currentLevel);

        try {
          const res = await fetch("/compress", { method: "POST", body: form });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Compression failed");

          origVal.textContent = fmtSize(data.original_size);
          compVal.textContent = fmtSize(data.compressed_size);
          const saved = data.saved_bytes > 0
            ? `${fmtSize(data.saved_bytes)} (${data.saved_percent}%)`
            : "Already optimized";
          savedVal.textContent = saved;

          const url = `/download/${data.token}?name=${encodeURIComponent(data.original_name)}`;
          downloadLink.setAttribute("href", url);
          resultEl.classList.add("show");
          setStatus("");
        } catch (err) {
          setStatus(err.message, "error");
        } finally {
          compressBtn.disabled = false;
          resetBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
